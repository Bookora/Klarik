<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarik – HELFO-dokumentasjon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-card: #111118;
    --bg-input: #0f0f17;
    --border: #1e1e2e;
    --border-focus: #3b3b5c;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --text-dim: #3a3a55;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --accent-hover: #818cf8;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .badge {
    margin-left: auto;
    font-size: 11px;
    font-family: 'Geist Mono', monospace;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* API key section */
  .api-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .api-section label {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: 'Geist Mono', monospace;
  }

  .api-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    font-family: 'Geist Mono', monospace;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--border-focus); }
  .api-input::placeholder { color: var(--text-dim); }

  /* Main card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-header h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .card-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-family: 'Geist Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-body { padding: 24px; }

  /* Textarea */
  textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--border-focus); }
  textarea::placeholder { color: var(--text-dim); }

  /* Example pills */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .example-pill {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .example-pill:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* Submit button */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-hover);
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }

  .result-card.visible { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-header span {
    font-size: 13px;
    font-family: 'Geist Mono', monospace;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-header span::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
  }

  .copy-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--border-focus); color: var(--text); }

  .result-body {
    padding: 24px;
  }

  /* Sections */
  .section {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-label {
    font-size: 11px;
    font-family: 'Geist Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .section-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* Journal text - special styling */
  .journal-text {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }

  .journal-copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .journal-copy-btn:hover { color: var(--text); border-color: var(--border-focus); }

  /* Warning badges */
  .warning-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
  }

  .warning-item:last-child { margin-bottom: 0; }

  .warning-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--warning);
    flex-shrink: 0;
    margin-top: 6px;
  }

  .warning-dot.critical { background: var(--danger); }

  /* Error state */
  .error-box {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
    margin-top: 12px;
  }

  .error-box.visible { display: block; }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Geist Mono', monospace;
    position: relative;
    z-index: 1;
  }
</style>

<script>
const SYSTEM_PROMPT = `Du er Klarik, en AI-assistent som hjelper norske tannleger med HELFO-dokumentasjon.

DIN ROLLE:
- Du analyserer behandlingsbeskrivelser og foreslår riktig stønadspunkt, takst og journaltekst
- Du gir alltid forslag – aldri beslutninger
- Tannlegen har alltid det endelige ansvaret
- Du er ikke en juridisk eller medisinsk rådgiver

FØR DU SVARER – OBLIGATORISK SJEKKLISTE:
Gå gjennom disse punktene ALLTID før du skriver noe:

1. Gjelder saken periodontitt (stønadspunkt 6)?
   → JA: Er stadium og grad oppgitt i beskrivelsen?
     → NEI: Seksjon 5 SKAL starte med: "KRITISK MANGEL: Diagnosen mangler stadium og grad (f.eks. Stadium III, grad B). Dette er påkrevd for HELFO-godkjenning."
     → JA: Inkluder stadium og grad i journalteksten
   → Journalteksten SKAL alltid inneholde hjemmel: "Behandling gis med hjemmel i folketrygdloven § 5-6, stønadspunkt 6 (periodontitt)."
   → Er klinisk festetap (CAL) oppgitt?
     → NEI: Legg til i seksjon 5: "KRITISK MANGEL: Klinisk festetap (CAL) er ikke dokumentert. Dette er påkrevd for HELFO-godkjenning."
   → Er antall tenner med ≥5mm lommer oppgitt?
     → NEI: Legg til i seksjon 5: "Oppgi antall tenner med lommedybder ≥5mm for mer presis dokumentasjon."

2. Brukes takst 501?
   → JA: Seksjon 5 SKAL alltid inneholde: "Husk: Dokumenter faktisk behandlingstid i minutter etter utført behandling – ikke som estimat."

3. Er journalteksten fri for estimater og fremtidsformuleringer?
   → Endre alle formuleringer som "vil bli", "forventes", "planlegges" til ferdig utført dokumentasjon

---

SLIK SVARER DU:
Bruk alltid denne strukturen med eksakte overskrifter:

## STØNADSPUNKT
Skriv hvilket stønadspunkt som er aktuelt og hvorfor.

## TAKST
Skriv hvilke takster som er relevante og eventuelle begrensninger.

## FERDIG JOURNALTEKST
Skriv en sammenhengende journaltekst klar til å kopiere inn i journal. Ingen punktlister. Ingen plassholdere.

## DOKUMENTASJONSKRAV OPPFYLT
Kort punktliste over hva som er dokumentert.

## MANGLER OG ADVARSLER
List kun konkrete mangler. Påminn alltid om å verifisere før innsending.

---

VIKTIGE REGLER:
- Hvis tilstanden ikke kvalifiserer til stønad, si det tydelig og forklar hvorfor
- Hvis du er usikker på stønadspunkt, si det – ikke gjett
- Aldri anbefale behandling – kun dokumentasjon
- Journalteksten skal alltid være komplett og klar til bruk – ingen plassholdere

REGEL – STADIUM OG GRAD VED PERIODONTITT (KRITISK):
Diagnose for periodontitt SKAL alltid inneholde stadium og grad (f.eks. Stadium III, grad B).
Hvis stadium og grad ikke er oppgitt i tannlegens beskrivelse, skal seksjon 5 ALLTID inneholde følgende:
"⚠️ KRITISK MANGEL: Diagnosen mangler stadium og grad. Dette er påkrevd for HELFO-godkjenning. Legg til f.eks. 'Stadium III, grad B' basert på dine kliniske funn."
Journalteksten skal i slike tilfeller inneholde: "[Legg til stadium og grad her]"

REGEL – TIDSBRUK VED TAKST 501 (KRITISK):
Tidsbruk skal ALDRI skrives som estimat eller fremtidig formulering (f.eks. "forventes å ta 30 minutter").
Tidsbruk dokumenteres alltid etter behandlingen er utført.
I journalteksten skal det alltid stå: "[Dokumenter faktisk behandlingstid i minutter etter utført behandling]"
Seksjon 5 skal alltid inneholde: "⚠️ Husk: Dokumenter faktisk behandlingstid i minutter etter at behandlingen er utført. Ikke estimat."

---

STØNADSPUNKT 6 – PERIODONTITT

6a – Behandling av marginal periodontitt / periimplantitt

Vilkår:
- Diagnosen må være marginal periodontitt eller periimplantitt (ikke gingivitt)
- Behandlingen må være systematisk, målrettet og faglig strukturert
- Det må foreligge journalført behandlingsplan
- Formålet er å oppnå infeksjonskontroll
- Takst 501 krever minimum 30 minutter aktiv behandlingstid
- Behandlingen må inkludere subgingival depurasjon, opplæring i egenomsorg, og eventuelle tiltak for røykeavvenning ved behov

Funn som må dokumenteres:
- Lommedybder (PPD)
- Blødning ved sondering (BOP)
- Klinisk eller radiologisk festetap
- Røntgenfunn (beintap)
- Diagnose med stadium og grad
- Anbefalt tillegg: plakkstatus, tannmobilitet, furkasjonsinvolvering, risikofaktorer (røyking, systemiske sykdommer)

Takster:
- Takst 501 – Subgingival depurasjon (hovedtakst), minimum 30 min, kan repeteres per påbegynt 30 min, maks 14 ganger per kalenderår
- Takst 502 – Tilleggstakst
- Takst 503 – Regenerativ behandling (kun spesialist)
- Takst 504 – Kirurgisk behandling (kun spesialist)
- Takst 505 – Støttebehandling
- Takst 1 – Undersøkelse (1 gang per år)
- Takst 2 – Spesialist (ved henvisning)

Krav til journalføring:
1. Hjemmel – eksempel: "Behandling gis med hjemmel i folketrygdloven § 5-6, stønadspunkt 6 (periodontitt)."
2. Diagnose med stadium og grad – eksempel: "Diagnose: Generalisert marginal periodontitt stadium III, grad B"
3. Aktiv sykdom – eksplisitt nevne at sykdommen er aktiv – eksempel: "Aktiv periodontal sykdom bekreftet ved blødning ved sondering og pågående festetap."
4. Presise kliniske funn – alle disse må med:
   - Antall tenner med lommedybder ≥5mm – eksempel: "8 tenner med lommedybder ≥5mm"
   - Klinisk festetap (CAL) – eksempel: "Klinisk festetap 3-5mm registrert"
   - Blødning ved sondering (BOP) med prosent – eksempel: "Blødning ved sondering 60%"
   - Røntgenfunn – eksempel: "Røntgen viser horisontalt beintap"
   - Plakkindeks om tilgjengelig
5. Eksplisitt kobling funn → behandlingsbehov – eksempel: "De registrerte funnene med multiple dype lommer, aktivt festetap og radiologisk beintap dokumenterer behov for systematisk periodontal behandling."
6. Behandlingsplan som del av helhetlig terapi – eksempel: "Initial systematisk subgingival depurasjon utføres som del av helhetlig periodontal terapi kvadrantvis."
7. Utført behandling med region – eksempel: "Utført initial systematisk subgingival depurasjon regio 16–13. Fjerning av subgingival plakk og tannstein."
8. Egenomsorg og motivasjon – eksempel: "Instruksjon i oral hygiene gitt. Pasienten er motivert for behandling og røykeavvenning er anbefalt."
9. Plan for reevaluering – eksempel: "Reevaluering planlegges etter fullført initial behandling."
10. Tidsbruk etter utført behandling (obligatorisk for takst 501) – eksempel: "Behandlingstid: 45 minutter"

Vanlige feil som gir avslag:
- Manglende hjemmel/stønadspunkt i journalteksten
- Manglende behandlingsplan
- Manglende diagnose eller diagnose uten stadium og grad
- Manglende tidsangivelse ved takst 501
- Tidsangivelse oppgitt som estimat før behandling – må dokumenteres etter
- Manglende klinisk festetap (CAL)
- Manglende antall tenner med dype lommer
- Ikke koblet funn til indikasjon for behandling
- For lite spesifikk journalføring (f.eks. "renset tenner")

---

6b – Rehabilitering ved tanntap

Vilkår:
- Tanntap må skyldes grav marginal periodontitt
- Årsak til tanntap må være dokumentert
- Munnhulen må være sanert for sykdom før rehabilitering
- Det må foreligge behandlingsplan og oppfølgingsplan

Funn som må dokumenteres:
- At tannen er tapt
- At årsaken er periodontitt
- At tannen ikke kan reddes

Takster:
- Takst 509–517 – Protetisk behandling
- Takst 401–402 – Implantatbehandling
- Takst 503–504 + 514 – Regenerasjon
- Takst 1–5 – Undersøkelse og kontroll

Krav til journalføring:
1. Årsak til tanntap – eksempel: "Tann 36 tapt som følge av alvorlig marginal periodontitt"
2. Begrunnelse for ekstraksjon – eksempel: "Ikke behandlingsbar på grunn av avansert festetap og mobilitet grad 3"
3. Sanering – dokumentasjon på at infeksjon er kontrollert
4. Behandlingsplan – eksempel: "Plan: Implantat i regio 36"
5. Oppfølgingsplan – eksempel: "Kontroll hver 3. måned"
6. Protetisk vurdering – midlertidig eller permanent løsning må angis

Vanlige feil som gir avslag:
- Manglende dokumentasjon på årsak til tanntap
- Manglende behandlingsplan eller oppfølgingsplan
- Ikke dokumentert at munnhulen er sanert

---

STØNADSPUNKT 9 – PATOLOGISK TAP AV TANNSUBSTANS (ATTRISJON / EROSJON)

Vilkår:
- Det må foreligge alvorlig patologisk tap av tannsubstans ved attrisjon og/eller erosjon
- Med alvorlig menes tilstander av vesentlig betydning for funksjon og estetikk som har medført vesentlig nedsatt tannhelse
- Behandlingen skal planlegges ut fra sykdommens aktivitet og langtidsprognose
- Behandlingen skal være mest mulig vevsbesparende
- Plastisk materiale er førstevalg
- Kroneterapi kan kun brukes dersom det er faglig nødvendig – må begrunnes i journal
- Protetisk behandling ved tapte tenner gis kun ved rotfraktur som følge av attrisjon

Funn som må dokumenteres:
- Tilstandens alvorlighetsgrad
- Skader vurdert opp mot pasientens alder
- Klinisk beskrivelse av slitasje: omfang, lokalisasjon, antall tenner, grad av substanstap
- Funksjonelle konsekvenser: bitehøyde, sensitivitet, funksjonssvikt
- Estetiske konsekvenser
- Aktivitet: pågående slitasje eller stabil tilstand
- Mulige årsaker: bruxisme, syrepåvirkning

Krav til journalføring:
1. Diagnose – eksempel: "Alvorlig patologisk tap av tannsubstans grunnet attrisjon/erosjon"
2. Alvorlighetsgrad – beskrivelse av omfang og grad av slitasje
3. Vurdering opp mot alder – eksempel: "Slitasjen vurderes som betydelig utover forventet nivå for pasientens alder"
4. Funksjon og estetikk – eksempel: "Redusert tyggefunksjon. Estetisk kompromittering."
5. Sykdomsaktivitet og prognose – eksempel: "Pågående slitasje relatert til bruksisme. Langtidsprognose vurdert som moderat/god."
6. Behandlingsplan – eksempel: "Plan: Restaurering med plastiske materialer i front og premolarområde"
7. Materialvalg – eksempel: "Plast valgt som førstevalg i tråd med vevsbesparende prinsipp"
8. Ved kroneterapi: begrunnelse for hvorfor plast ikke er tilstrekkelig og hvorfor krone gir vesentlig bedre funksjon
9. Ved tap av tann: dokumentasjon på rotfraktur og at frakturen skyldes attrisjon

Vanlige feil som gir avslag:
- Manglende dokumentasjon på alvorlighetsgrad
- Ingen vurdering opp mot pasientens alder
- Ikke beskrevet funksjonell eller estetisk konsekvens
- Kroneterapi uten tydelig begrunnelse
- Bruk av krone der plast kunne vært brukt
- Manglende dokumentasjon på rotfraktur ved tanntap
- For lite spesifikk journaltekst

---

STØNADSPUNKT 13 – TANNSKADE VED ULYKKE (IKKE YRKESSKADE)

13a – Omfattende tannskade ved ulykke

Vilkår:
- Skaden må skyldes ulykke (ikke yrkesskade)
- Behandlingen skal gjenopprette tilstanden slik den var før ulykken
- Tidligere skader eller defekter som ikke er relatert til ulykken dekkes ikke
- Behandling må påbegynnes innen 1 år etter ulykken
- Stønad gis som engangsytelse
- Unntak fra ettårsregelen: hvis første behandling er utført før utgangen av året pasienten fyller 20 år

Funn som må dokumenteres:
- At skaden skyldes en ulykke
- Skadens omfang: hvilke tenner som er involvert, type skade (fraktur, luksasjon, avulsjon osv.)
- Funksjonelle konsekvenser
- Estetiske konsekvenser
- Pasientens tilstand før ulykken (så langt mulig)
- Hva som er direkte skade fra ulykken
- Avgrensning mot tidligere skader

Krav til journalføring:
1. Beskrivelse av ulykken – eksempel: "Pasienten falt på is og pådro seg tannskade"
2. Skadeomfang – eksempel: "Fraktur av tann 11 og 21. Luksasjon av tann 12."
3. Funksjon og estetikk – eksempel: "Betydelig redusert funksjon og estetikk i front"
4. Alvorlighetsgrad – eksempel: "Skaden vurderes som omfattende og av vesentlig betydning for funksjon og estetikk"
5. Sammenheng med ulykken – eksempel: "Skadene vurderes som direkte forårsaket av aktuell ulykke"
6. Tidligere tilstand – eksempel: "Ingen tidligere skader i området"
7. Behandlingsplan – eksempel: "Plan: Oppbygging med kompositt, eventuelt senere protetisk rehabilitering"
8. Tidsaspekt – dato for ulykken og dato for behandlingsstart må dokumenteres

Takster:
- 13a: Refunderes etter refusjonstakster
- 13b: Refunderes etter honorartakster

Vanlige feil som gir avslag:
- Manglende dokumentasjon på at skade skyldes ulykke
- Ikke tydelig avgrensning mot tidligere skader
- Manglende beskrivelse av funksjon og estetikk
- Ikke dokumentert at skaden er omfattende
- Behandling startet etter ettårsfristen uten gyldig unntak
- For generell journaltekst uten konkret skadebeskrivelse

---

13b – Tannskade ved sykdom med fallrisiko

Vilkår:
- Tannskade oppstått som følge av sykdom med fallrisiko (f.eks. epilepsi)

Krav til journalføring:
1. Underliggende sykdom – eksempel: "Epilepsi med anfall"
2. Sammenheng mellom sykdom og skade – eksempel: "Tannskade oppstod under anfall"
3. Skadebeskrivelse: tenner, type skade, konsekvenser
4. Ved rebehandling: dokumentasjon på at det gjelder tidligere skade og at ny behandling er nødvendig

Vanlige feil som gir avslag:
- Manglende dokumentasjon på sammenheng mellom sykdom og skade
- For generell journaltekst
`;

const EXAMPLES = {
  periodontitt: "Pasient 54 år, røyker. Stadium III, grad B marginal periodontitt. Lommedybder 5-7mm flere steder. Blødning ved sondering. Røntgen viser beintap. Utført subgingival depurasjon regio 16-13. Behandlingstid 45 minutter.",
  ulykke: "Pasient 28 år. Falt på sykkel 15. mars 2026. Fraktur av tann 11 og 21. Luksasjon av tann 12. Betydelig redusert funksjon og estetikk i front. Ingen tidligere skader i området. Behandling påbegynt 20. mars 2026.",
  slitasje: "Pasient 42 år. Betydelig slitasje på tenner i front og premolarområde relatert til bruksisme. Redusert tyggefunksjon og estetisk kompromittering. Slitasjen vurderes som betydelig utover forventet for alder. Pågående slitasje. Restaurering med plastiske materialer utført."
};

function fillExample(type) {
  document.getElementById('inputText').value = EXAMPLES[type];
}

function copyAll() {
  const resultBody = document.getElementById('resultBody');
  navigator.clipboard.writeText(resultBody.innerText);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Kopiert ✓';
  setTimeout(() => btn.textContent = 'Kopier alt', 2000);
}

function copyJournal() {
  const journalText = document.getElementById('journalText');
  navigator.clipboard.writeText(journalText.innerText);
  const btn = document.querySelector('.journal-copy-btn');
  btn.textContent = 'Kopiert ✓';
  setTimeout(() => btn.textContent = 'Kopier', 2000);
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const input = document.getElementById('inputText').value.trim();
  const btn = document.getElementById('analyzeBtn');
  const btnText = document.getElementById('btnText');
  const errorBox = document.getElementById('errorBox');
  const resultCard = document.getElementById('resultCard');

  errorBox.classList.remove('visible');

  if (!apiKey) {
    errorBox.textContent = 'Lim inn din OpenAI API-nøkkel øverst.';
    errorBox.classList.add('visible');
    return;
  }

  if (!input) {
    errorBox.textContent = 'Beskriv behandlingen først.';
    errorBox.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> Analyserer...';
  resultCard.classList.remove('visible');

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 1500,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: input }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API-feil');
    }

    const data = await response.json();
    const text = data.choices[0].message.content.trim();
    renderResult(text);

  } catch (err) {
    errorBox.textContent = `Feil: ${err.message}`;
    errorBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Analyser med Klarik';
  }
}

function renderResult(text) {
  const body = document.getElementById('resultBody');

  // Parse sections from markdown headings
  const sections = [];
  const lines = text.split('\n');
  let currentSection = null;

  for (const line of lines) {
    if (line.startsWith('## ')) {
      if (currentSection) sections.push(currentSection);
      currentSection = { title: line.replace('## ', '').trim(), content: [] };
    } else if (currentSection) {
      currentSection.content.push(line);
    }
  }
  if (currentSection) sections.push(currentSection);

  // If no sections found, show raw text
  if (sections.length === 0) {
    body.innerHTML = `<div class="section"><div class="section-content" style="white-space:pre-wrap;">${text}</div></div>`;
    document.getElementById('resultCard').classList.add('visible');
    return;
  }

  let html = '';
  for (const section of sections) {
    const content = section.content.join('\n').trim();
    const isJournal = section.title.includes('JOURNALTEKST');
    const isWarning = section.title.includes('MANGLER');

    html += `<div class="section">
      <div class="section-label">${section.title}</div>`;

    if (isJournal) {
      html += `<div class="journal-text" id="journalText">${content}<button class="journal-copy-btn" onclick="copyJournal()">Kopier</button></div>`;
    } else if (isWarning) {
      const items = content.split('\n').filter(l => l.trim());
      html += items.map(item => {
        const isCritical = item.toLowerCase().includes('kritisk');
        const clean = item.replace(/^[-*]\s*/, '');
        return `<div class="warning-item"><div class="warning-dot ${isCritical ? 'critical' : ''}"></div><span>${clean}</span></div>`;
      }).join('');
    } else {
      html += `<div class="section-content" style="white-space:pre-wrap;font-size:14px;">${content}</div>`;
    }

    html += '</div>';
  }

  body.innerHTML = html;
  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
