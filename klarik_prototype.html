<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarik – HELFO-dokumentasjon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg-card: #111118;
    --bg-input: #0f0f17;
    --border: #1e1e2e;
    --border-focus: #3b3b5c;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --text-dim: #3a3a55;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --accent-hover: #818cf8;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 500;
    font-size: 16px;
    color: white;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .badge {
    margin-left: auto;
    font-size: 11px;
    font-family: 'Geist Mono', monospace;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* API key section */
  .api-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .api-section label {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    font-family: 'Geist Mono', monospace;
  }

  .api-input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 13px;
    font-family: 'Geist Mono', monospace;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--border-focus); }
  .api-input::placeholder { color: var(--text-dim); }

  /* Main card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-header h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .card-header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 12px;
    font-family: 'Geist Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-body { padding: 24px; }

  /* Textarea */
  textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.6;
    padding: 16px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--border-focus); }
  textarea::placeholder { color: var(--text-dim); }

  /* Example pills */
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .example-pill {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .example-pill:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* Submit button */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    position: relative;
    overflow: hidden;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--accent-hover);
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  .result-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }

  .result-card.visible { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-header span {
    font-size: 13px;
    font-family: 'Geist Mono', monospace;
    color: var(--success);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-header span::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--success);
    border-radius: 50%;
  }

  .copy-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--border-focus); color: var(--text); }

  .result-body {
    padding: 24px;
  }

  /* Sections */
  .section {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .section-label {
    font-size: 11px;
    font-family: 'Geist Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .section-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  /* Journal text - special styling */
  .journal-text {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }

  .journal-copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .journal-copy-btn:hover { color: var(--text); border-color: var(--border-focus); }

  /* Warning badges */
  .warning-item {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
  }

  .warning-item:last-child { margin-bottom: 0; }

  .warning-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--warning);
    flex-shrink: 0;
    margin-top: 6px;
  }

  .warning-dot.critical { background: var(--danger); }

  /* Error state */
  .error-box {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
    margin-top: 12px;
  }

  .error-box.visible { display: block; }

  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'Geist Mono', monospace;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">K</div>
    <span class="logo-text">Klarik</span>
    <span class="badge">prototype v0.1</span>
  </header>

  <!-- API Key -->
  <div class="api-section">
    <label>API-nøkkel</label>
    <input type="password" class="api-input" id="apiKey" placeholder="sk-..." />
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-header">
      <div class="step-num">1</div>
      <div>
        <h2>Beskriv behandlingen</h2>
        <p>Klarik analyserer og foreslår stønadspunkt, takst og dokumentasjon</p>
      </div>
    </div>
    <div class="card-body">
      <textarea id="inputText" placeholder="Beskriv behandlingen... f.eks: Pasient 54 år, røyker. Stadium III grad B marginal periodontitt. Lommedybder 5-7mm. Blødning ved sondering. Røntgen viser beintap. Utført subgingival depurasjon regio 16-13. Behandlingstid 45 minutter."></textarea>

      <div class="examples">
        <span class="example-label" style="font-size:12px;color:var(--text-dim);align-self:center;">Eksempler:</span>
        <button class="example-pill" onclick="fillExample('periodontitt')">Periodontitt</button>
        <button class="example-pill" onclick="fillExample('ulykke')">Tannskade ulykke</button>
        <button class="example-pill" onclick="fillExample('slitasje')">Tannslitasje</button>
      </div>

      <button class="btn-primary" id="analyzeBtn" onclick="analyze()">
        <span id="btnText">Analyser med Klarik</span>
      </button>

      <div class="error-box" id="errorBox"></div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span>Analyse fullført</span>
      <button class="copy-btn" onclick="copyAll()">Kopier alt</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

</div>

<footer>klarik.no — Klarik gir alltid forslag, aldri beslutninger. Tannlegen har alltid det endelige ansvaret.</footer>

<script>
const SYSTEM_PROMPT = `Du er Klarik, en AI-assistent som hjelper norske tannleger med HELFO-dokumentasjon.

DIN ROLLE:
- Du analyserer behandlingsbeskrivelser og foreslår riktig stønadspunkt, takst og journaltekst
- Du gir alltid forslag – aldri beslutninger
- Tannlegen har alltid det endelige ansvaret
- Du er ikke en juridisk eller medisinsk rådgiver

FØR DU SVARER – OBLIGATORISK SJEKKLISTE:
Gå gjennom disse punktene ALLTID før du skriver noe:

1. Gjelder saken periodontitt (stønadspunkt 6)?
   → JA: Er stadium og grad oppgitt i beskrivelsen?
     → NEI: Seksjon 5 SKAL starte med: "KRITISK MANGEL: Diagnosen mangler stadium og grad (f.eks. Stadium III, grad B). Dette er påkrevd for HELFO-godkjenning."
     → JA: Inkluder stadium og grad i journalteksten

2. Brukes takst 501?
   → JA: Seksjon 5 SKAL alltid inneholde: "Husk: Dokumenter faktisk behandlingstid i minutter etter utført behandling – ikke som estimat."

3. Er journalteksten fri for estimater og fremtidsformuleringer?
   → Endre alle formuleringer som "vil bli", "forventes", "planlegges" til ferdig utført dokumentasjon

SLIK SVARER DU:
Du skal svare i et strukturert JSON-format. Ingen tekst utenfor JSON. Svar alltid slik:

{
  "stonadspunkt": {
    "kode": "6a",
    "navn": "Behandling av marginal periodontitt",
    "begrunnelse": "Forklaring på hvorfor dette stønadspunktet er aktuelt"
  },
  "takst": {
    "hovedtakst": "Takst 501",
    "beskrivelse": "Subgingival depurasjon",
    "begrensninger": "Minimum 30 min, maks 14 ganger per kalenderår"
  },
  "journaltekst": "Ferdig sammenhengende journaltekst klar til å kopiere inn i journal. Ingen punktlister. Ingen plassholdere.",
  "oversikt": ["Punkt 1", "Punkt 2", "Punkt 3"],
  "mangler": ["Mangel 1", "Mangel 2"]
}

VIKTIGE REGLER:
- Svar KUN med JSON – ingen tekst før eller etter
- Journalteksten skal være sammenhengende prosa, ikke punktlister
- Hvis tilstanden ikke kvalifiserer til stønad, si det tydelig i begrunnelse
- Aldri anbefale behandling – kun dokumentasjon

STØNADSPUNKT 6 – PERIODONTITT

6a – Behandling av marginal periodontitt / periimplantitt
Vilkår: Diagnosen må være marginal periodontitt eller periimplantitt (ikke gingivitt). Behandlingen må være systematisk, målrettet og faglig strukturert. Det må foreligge journalført behandlingsplan. Formålet er å oppnå infeksjonskontroll. Takst 501 krever minimum 30 minutter aktiv behandlingstid. Behandlingen må inkludere subgingival depurasjon, opplæring i egenomsorg, og eventuelle tiltak for røykeavvenning ved behov.
Funn som må dokumenteres: Lommedybder (PPD), blødning ved sondering (BOP), klinisk eller radiologisk festetap, røntgenfunn (beintap), diagnose med stadium og grad.
Takster: Takst 501 – Subgingival depurasjon (minimum 30 min, maks 14 ganger per kalenderår). Takst 502 – Tilleggstakst. Takst 503/504 – kun spesialist. Takst 505 – støttebehandling.
Journaleksempel: "Diagnose: Generalisert marginal periodontitt stadium III, grad B. Lommedybder 5-7mm, blødning ved sondering, røntgen viser beintap. Utført subgingival depurasjon regio 16-13. Instruksjon i oral hygiene gitt. Røykeavvenning anbefalt. Behandlingstid: 45 minutter."
Vanlige feil: Manglende behandlingsplan, manglende diagnose uten stadium og grad, manglende tidsangivelse ved takst 501, fremtidsformuleringer.

6b – Rehabilitering ved tanntap
Vilkår: Tanntap skyldes grav marginal periodontitt. Munnhulen må være sanert. Det må foreligge behandlingsplan og oppfølgingsplan.
Takster: Takst 509-517 (protetisk), 401-402 (implantat).
Vanlige feil: Manglende dokumentasjon på årsak til tanntap, manglende oppfølgingsplan.

STØNADSPUNKT 9 – PATOLOGISK TAP AV TANNSUBSTANS (ATTRISJON/EROSJON)
Vilkår: Alvorlig patologisk tap av vesentlig betydning for funksjon og estetikk. Plastisk materiale er førstevalg. Kroneterapi må begrunnes.
Funn: Alvorlighetsgrad, vurdering mot pasientens alder, funksjonelle og estetiske konsekvenser, sykdomsaktivitet.
Vanlige feil: Manglende aldersbasert vurdering, kroneterapi uten begrunnelse, manglende funksjonsbeskrivelse.

STØNADSPUNKT 13 – TANNSKADE VED ULYKKE (IKKE YRKESSKADE)
13a – Vilkår: Skaden skyldes ulykke. Behandling må starte innen 1 år. Stønad er engangsytelse.
Funn: Ulykkesdato, skadeomfang med tannnummer, funksjonelle/estetiske konsekvenser, avgrensning mot tidligere skader, dato for behandlingsstart.
Vanlige feil: Manglende ulykkesdokumentasjon, ikke avgrenset mot tidligere skader, behandling etter ettårsfristen.

13b – Tannskade ved sykdom med fallrisiko (f.eks. epilepsi). Underliggende sykdom og sammenheng med skade må dokumenteres.`;

const EXAMPLES = {
  periodontitt: "Pasient 54 år, røyker. Stadium III, grad B marginal periodontitt. Lommedybder 5-7mm flere steder. Blødning ved sondering. Røntgen viser beintap. Utført subgingival depurasjon regio 16-13. Behandlingstid 45 minutter.",
  ulykke: "Pasient 28 år. Falt på sykkel 15. mars 2026. Fraktur av tann 11 og 21. Luksasjon av tann 12. Betydelig redusert funksjon og estetikk i front. Ingen tidligere skader i området. Behandling påbegynt 20. mars 2026.",
  slitasje: "Pasient 42 år. Betydelig slitasje på tenner i front og premolarområde relatert til bruksisme. Redusert tyggefunksjon og estetisk kompromittering. Slitasjen vurderes som betydelig utover forventet for alder. Pågående slitasje. Restaurering med plastiske materialer utført."
};

function fillExample(type) {
  document.getElementById('inputText').value = EXAMPLES[type];
}

function copyAll() {
  const resultBody = document.getElementById('resultBody');
  navigator.clipboard.writeText(resultBody.innerText);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Kopiert ✓';
  setTimeout(() => btn.textContent = 'Kopier alt', 2000);
}

function copyJournal() {
  const journalText = document.getElementById('journalText');
  navigator.clipboard.writeText(journalText.innerText);
  const btn = document.querySelector('.journal-copy-btn');
  btn.textContent = 'Kopiert ✓';
  setTimeout(() => btn.textContent = 'Kopier', 2000);
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const input = document.getElementById('inputText').value.trim();
  const btn = document.getElementById('analyzeBtn');
  const btnText = document.getElementById('btnText');
  const errorBox = document.getElementById('errorBox');
  const resultCard = document.getElementById('resultCard');

  errorBox.classList.remove('visible');

  if (!apiKey) {
    errorBox.textContent = 'Lim inn din OpenAI API-nøkkel øverst.';
    errorBox.classList.add('visible');
    return;
  }

  if (!input) {
    errorBox.textContent = 'Beskriv behandlingen først.';
    errorBox.classList.add('visible');
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> Analyserer...';
  resultCard.classList.remove('visible');

  try {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 1500,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: input }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API-feil');
    }

    const data = await response.json();
    let text = data.choices[0].message.content.trim();

    // Strip markdown code fences if present
    text = text.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '').trim();

    const result = JSON.parse(text);
    renderResult(result);

  } catch (err) {
    errorBox.textContent = `Feil: ${err.message}`;
    errorBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Analyser med Klarik';
  }
}

function renderResult(r) {
  const body = document.getElementById('resultBody');

  const manglerHTML = (r.mangler || []).map(m => {
    const isCritical = m.toLowerCase().includes('kritisk');
    return `<div class="warning-item">
      <div class="warning-dot ${isCritical ? 'critical' : ''}"></div>
      <span>${m}</span>
    </div>`;
  }).join('');

  const oversiktHTML = (r.oversikt || []).map(o =>
    `<div class="warning-item"><div class="warning-dot" style="background:var(--accent)"></div><span>${o}</span></div>`
  ).join('');

  body.innerHTML = `
    <div class="section">
      <div class="section-label">Stønadspunkt</div>
      <div class="section-content">
        <strong style="color:var(--accent);font-size:15px;">${r.stonadspunkt?.kode || ''} – ${r.stonadspunkt?.navn || ''}</strong>
        <p style="margin-top:6px;color:var(--text-muted);font-size:13px;">${r.stonadspunkt?.begrunnelse || ''}</p>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Takst</div>
      <div class="section-content">
        <strong>${r.takst?.hovedtakst || ''}</strong> – ${r.takst?.beskrivelse || ''}
        ${r.takst?.begrensninger ? `<p style="margin-top:4px;font-size:13px;color:var(--text-muted);">${r.takst.begrensninger}</p>` : ''}
      </div>
    </div>

    <div class="section">
      <div class="section-label">Ferdig journaltekst</div>
      <div class="journal-text" id="journalText">${r.journaltekst || ''}
        <button class="journal-copy-btn" onclick="copyJournal()">Kopier</button>
      </div>
    </div>

    ${oversiktHTML ? `<div class="section">
      <div class="section-label">Dokumentasjonskrav oppfylt</div>
      ${oversiktHTML}
    </div>` : ''}

    ${manglerHTML ? `<div class="section">
      <div class="section-label">Mangler og advarsler</div>
      ${manglerHTML}
    </div>` : ''}
  `;

  document.getElementById('resultCard').classList.add('visible');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
